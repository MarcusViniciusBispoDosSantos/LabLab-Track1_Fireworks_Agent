name: Track 1 Online Check

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  docker-contract-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Docker contract test with mock harness
        run: bash scripts/test_with_mock.sh track1-fireworks-agent:ci

      - name: Confirm image architecture
        run: |
          ARCH=$(docker image inspect track1-fireworks-agent:ci --format '{{.Architecture}}')
          echo "Architecture: $ARCH"
          test "$ARCH" = "amd64"

      - name: Confirm .env is not inside image
        run: |
          docker run --rm track1-fireworks-agent:ci sh -c 'test ! -f /app/.env && echo OK_NO_ENV_FILE'

      - name: Run classifier sanity check
        run: |
          python - <<'PY'
          from src.classifier import classify_task, TaskType
          cases = {
              TaskType.FACTUAL: "Explain what HTTP is in two sentences.",
              TaskType.MATH: "A company has 1200 users and grows 15% then loses 8%. How many users remain?",
              TaskType.SENTIMENT: "Classify the sentiment: The app is fast but crashes often.",
              TaskType.SUMMARY: "Summarize the following text in one sentence: Cloud computing rents infrastructure.",
              TaskType.NER: "Extract named entities: Maria joined AMD in Austin on July 4, 2026.",
              TaskType.CODE_DEBUG: "Find and fix the bug in this Python function:\ndef f(nums):\n return len(num)",
              TaskType.LOGIC: "Alice, Bob, and Carla each own one pet. Alice does not own the dog. Who owns each pet?",
              TaskType.CODE_GEN: "Write a Python function called is_palindrome(text).",
          }
          for expected, prompt in cases.items():
              actual = classify_task(prompt)
              print(expected, actual)
              assert actual == expected, (expected, actual, prompt)
          print("PASS_CLASSIFIER_SANITY")
          PY
