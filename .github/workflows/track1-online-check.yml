name: Track 1 Online Check

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  docker-contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run Docker contract test with mock harness
        run: bash scripts/test_with_mock.sh
